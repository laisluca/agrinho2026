    <meta charset>"utf-8"/>
    <meta name="viewport"

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        <body> {
            background:#f5f5f5;
            color:#333;
            line-height: 1.6;
        }
        
            <header> {
                background: linear-gradient(135deg, #2e7d32, #66bb6a);
                color: white;
                text-align: center;
                padding: 60px 20px;
            }

            <nav> {
                background: #1b5e20;
                text-align: center;
                padding: 12px;
            }

            nav a {
                color: white;
                text-decoration: none;
                margin: 0 15px;
                font-weight: bold;
            }

            <section> {
                max-width: 1000px;
                margin: auto;
                padding: 50 px 20 px;
            }

            .cards {
                display: grid;
                grid-template-columns: repeat(auto-fit.minmax(250px, 1fr));
                gap: 20px;
                margin-top: 30px;
            }

            .card {
                background: white;
                padding: 25px;
                border-radius: 12px;
                box-shadow: 0 4px 10px rgba(0, 0, 0, .1);
            }

            <footer> {
                background: #1b5e20;
                color: white;
                text-align: center;
                padding: 20px;
                margin-top: 40px;
            }

            .botao {
                display: inline-block;
                margin-top: 20px;
                background: #2e7d32;
                color: white;
                padding: 12px 25px;
                text-decoration: none;
                border-radius: 8px;
            }

            .botao:hover {
                background: #1b5e20;
            }
